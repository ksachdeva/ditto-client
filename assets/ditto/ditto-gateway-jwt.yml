include:
  - ditto-services.yml

services:

  oauth:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.6
    restart: unless-stopped
    environment:
      PORT: 9900
      LOG_LEVEL: INFO
      JSON_CONFIG: |
          {
            "interactiveLogin": false,
            "httpServer": "NettyWrapper",
            "tokenCallbacks": [
              {
                "issuerId": "ditto",
                "tokenExpiry": 3600,
                "requestMappings": [
                  {
                    "requestParam": "grant_type",
                    "match": "*",
                    "claims": {
                      "sub": "ditto",
                      "aud": ["ditto"]
                    }
                  }
                ]
              }
            ]
          }
    networks:
      default:
        aliases:
          - oauth
    ports:
      - "9900:9900"
    logging:
      options:
        max-size: 10m

  gateway:
      image: docker.io/eclipse/ditto-gateway:${DITTO_VERSION:-latest}
      restart: unless-stopped
      networks:
        default:
          aliases:
            - ditto-cluster
      depends_on:
        - policies
        - oauth
      ports:
        - "8081:8080"
      healthcheck:
        test: curl --fail `hostname`:7626/alive || exit 1
        interval: 30s
        timeout: 15s
        retries: 4
        start_period: 120s
      logging:
        options:
          max-size: 50m
      environment:
        TZ: UTC
        BIND_HOSTNAME: 0.0.0.0
        ENABLE_PRE_AUTHENTICATION: false
        JAVA_TOOL_OPTIONS: >-
            -XX:ActiveProcessorCount=2
            -XX:+ExitOnOutOfMemoryError
            -XX:+UseContainerSupport
            -XX:+UseStringDeduplication
            -Xss512k
            -XX:MaxRAMPercentage=50
            -XX:+UseG1GC
            -XX:MaxGCPauseMillis=150
            -Dpekko.coordinated-shutdown.exit-jvm=on
            -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
            -Dpekko.cluster.failure-detector.threshold=15.0
            -Dpekko.cluster.failure-detector.expected-response-after=10s
            -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
            -Dpekko.cluster.downing-provider-class=
            -Dditto.gateway.authentication.oauth.protocol=http
            -Dditto.gateway.authentication.oauth.openid-connect-issuers.nginx.issuer=http://host.docker.internal:9900/ditto
            -Dditto.gateway.authentication.oauth.openid-connect-issuers.nginx.auth-subjects.0="{{ jwt:sub }}"
